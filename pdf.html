<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ultimate Pro PDF Suite</title>

<!-- External Core Libraries -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  color: white;
  background: #09090b;
  overflow-x: hidden;
  user-select: none;
}

.header {
  margin-top: 15px; 
  text-align: center;
  font-size: 32px;
  padding: 10px;
  font-weight: 900;
  background: linear-gradient(90deg, red,red, gold, yellow);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 1px;
}

.page { display: none; padding: 20px; box-sizing: border-box; }
.active { display: block; }

.dash-btn {
  width: 100%;
  height: 80px;
  font-size: 38px;
  border-radius: 16px;
  border: 1px solid white;
  background: linear-gradient(135deg, red,rgb(124, 47, 212));
  color: white;
  cursor: pointer;
  transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  box-shadow: none;
}
.dash-btn:hover { transform: translateY(-3px); border-color: yellow; }

.back-btn, .home-btn, .next-preview-btn {
  position: fixed;
  top: 10px;
  padding: 5px 11px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 30px;
  z-index: 200500;
  cursor: pointer;
  border: none;
  color: white;
  backdrop-filter: blur(10px);
}
.back-btn { left: 10px; background: rgba(255, 0, 85, 0.8); }
.home-btn { right: 10px; background: rgba(0, 150, 255, 0.8); }
.next-preview-btn { 
  right: 15px; 
  background: linear-gradient(45deg, #00ffcc, #0096ff); 
  color: black; 
}

/* Top Center Import Button Bar */
.top-import-container {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200500;
  display: flex;
  justify-content: center;
}

.workspace-wrapper {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 50px; 
  touch-action: pan-x pan-y;
}

.image-container {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  padding: 20px;
  height: 350px; 
  width: 100%;
  scroll-behavior: smooth;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  align-items: center;
  scroll-snap-type: x mandatory;
}
.image-container::-webkit-scrollbar { display: none; }

.image-box {
  flex: 0 0 190px;
  height: 250px;
  border-radius: 18px;
  position: relative;
  background: #141416;
  border: 2px solid transparent;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
  scroll-snap-align: center;
}

.image-box.selected {
  flex: 0 0 250px;
  height: 310px;
  border-color: #00b7ff;
  box-shadow: 0 0 25px rgba(0, 208, 255, 0.495);
  transform: scale(1.03);
  z-index: 10;
}

@media (max-width: 600px) {
  .image-container {
    padding: 15px 8vw;
    height: 340px;
  }
  .image-box {
    flex: 0 0 78vw;
    height: 270px;
  }
  .image-box.selected {
    flex: 0 0 84vw;
    height: 310px;
  }
}

.image-box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 16px;
  pointer-events: none;
}
.index-tag {
  position: absolute;
  top: 12px;
  left: 12px;
  background: #ff0055;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: bold;
  z-index: 5;
}

.action-overlay {
  position: absolute;
  top: 12px;
  right: 12px;
  display: flex;
  gap: 6px;
  z-index: 10;
}
.action-overlay button {
  background: rgba(0, 0, 0, 0.85);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
}
.action-overlay button:hover { background: #ff0055; }

/* Movable Layers & Selection States */
.movable-layer {
  position: absolute;
  cursor: move;
  border: 2px dashed transparent;
  padding: 8px;
  user-select: none;
  z-index: 9999;
  background: transparent;
  display: none;
  transform-origin: center center;
  touch-action: none;
  border-radius: 8px;
  transition: border-color 0.2s, background 0.2s;
}
.movable-layer.active { display: inline-block; }
.movable-layer.selected { 
  border-color: #00ffcc; 
  background: rgba(0,0,0,0.4); 
}

#movableTextLayer {
  font-size: 28px;
  color: white;
  font-weight: bold;
  font-family: Arial, sans-serif;
  white-space: nowrap;
}

.layer-handle {
  position: absolute;
  width: 28px;
  height: 28px;
  background: #00ffcc;
  color: black;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: bold;
  box-shadow: 0 0 10px rgba(0,0,0,0.8);
  z-index: 10000;
  touch-action: none;
}
.movable-layer.selected .layer-handle {
  display: flex;
}

.handle-rotate { top: -16px; left: 50%; transform: translateX(-50%); cursor: grab; }
.handle-resize { bottom: -16px; right: -16px; cursor: nwse-resize; }
.handle-delete { top: -16px; right: -16px; background: #ff0055; color: white; cursor: pointer; }

.cropper-point {
  width: 20px !important;
  height: 20px !important;
  background-color: #00ffcc !important;
  opacity: 0.95 !important;
  border-radius: 50% !important;
  border: 2px solid #000 !important;
}
.cropper-line { background-color: #f8fcfb !important; }
.cropper-view-box { outline: 2px dashed #f9fcfc !important; }

/* Panels */
.edit-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #0f0f11;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding: 10px 0;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.main-import-btn {
  background: linear-gradient(45deg, #00ffcc, #0096ff);
  color: black;
  font-weight: 800;
  padding: 10px 22px;
  border-radius: 25px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  box-shadow: /* 0 4px 15px rgba(0,255,204,0.3) */none;
  border: none;
  transition: transform 0.2s;
}
.main-import-btn:active { transform: scale(0.96); }

/* Horizontal Scrollable Tools Row */
.tool-row {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  overflow-x: auto;
  padding: 5px 15px;
  gap: 15px;
  white-space: nowrap;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tool-row::-webkit-scrollbar { display: none; }

.tool-row button {
  background: transparent;
  border: none;
  color: #a1a1aa;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}
.tool-row button.active, .tool-row button:hover { color: #00ffcc; }
.tool-row button:disabled { opacity: 0.3; cursor: not-allowed; color: #52525b; }

.sub-panel {
  display: none;
  background: #18181b;
  padding: 15px;
  gap: 15px;
  overflow-x: auto;
  align-items: center;
}
.sub-panel.active { display: flex; }

.slider-group { display: flex; flex-direction: column; gap: 5px; min-width: 120px; text-align: center; }
.slider-group input { accent-color: #00ffcc; width: 100px; }

.filter-btn {
  padding: 8px 16px;
  background: #27272a;
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
}

.draft-card {
  background: #141416;
  border: 1px solid white/* rgba(255,255,255,0.08) */;
  border-radius: 16px;
  padding: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 15px;
  margin-bottom: 15px;
}
.draft-left { display: flex; align-items: center; gap: 15px; }
.draft-thumb {
  width: 75px;
  height: 75px;
  object-fit: cover;
  border-radius: 12px;
  border: 2px solid white/* rgba(255,255,255,0.1) */;
}
.draft-details h4 { margin: 0 0 5px 0; font-size: 16px; color: white; }
.draft-meta { font-size: 12px; color: #71717a; display: flex; gap: 10px; flex-wrap: wrap; }
.draft-actions { display: flex; flex-direction: column; gap: 8px; }
.draft-actions button {
  padding: 6px 12px;
  border-radius: 8px;
  border: none;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
}
.btn-cont { background: #00ffcc; color: black; }
.btn-del { background: rgba(255,0,85,0.2); color: #ff0055; }

.text-input-field {
  background: #27272a;
  border: 1px solid #3f3f46;
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 16px;
}

#pdfPreview, #pdfToImgPreview {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 15px;
  margin-top: 20px;
}
.preview-item-wrapper {
  position: relative;
  background: #141416;
  border-radius: 10px;
  padding: 5px;
}
.preview-item-wrapper img { width: 100%; border-radius: 8px; }
.preview-delete-btn {
  position: absolute;
  top: 5px;
  right: 5px;
  background: rgba(255,0,85,0.9);
  color: white;
  border: none;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  cursor: pointer;
  font-weight: bold;
}

.back-to-index {
  position: fixed;
  top: 10px;
  left: 10px;
  background: transparent;
  border: none;
  color: white;
  font-size: 30px;
  cursor: pointer;
  padding: 0;
  z-index: 9999;
}
</style>
</head>
<body>

<!-- PAGE 1: MAIN DASHBOARD -->
<div id="page1" class="page active">
    <button class="back-to-index" onclick="window.location.href='index.html'">←</button>
  <div class="header">... 𝙋𝘿𝙁  ⇄  𝙄𝙈𝘼𝙂𝙀𝙎 ...</div>
  <div style="margin: 30px 0;">
    <h2 >𝙄𝙈𝘼𝙂𝙀𝙎 ⇉  𝙋𝘿𝙁</h2>
    <button class="dash-btn" onclick="startNewProject()"> 🖼  ➔  📕 <br></button>
    <h2 >𝙋𝘿𝙁  ⇉  𝙄𝙈𝘼𝙂𝙀𝙎</h2>
    <button class="dash-btn" onclick="showPage(4)">📕  ➔  🖼 <br></button>
  </div>

  <hr style="border-color: rgba(255,255,255,0.05); margin: 30px 0;">
  
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
    <h3 style="margin:0; font-size:20px; font-weight:800;">📂 Drafts</h3>
    <button onclick="deleteAllDrafts()" style="background:none; border:none; color:#ff0055; cursor:pointer; font-weight:bold;">Clear All</button>
  </div>
  
  <div id="draftList"></div>
</div>

<!-- PAGE 2: WORKSPACE -->
<div id="page2" class="page">
  <button class="back-btn" onclick="goHome()">⬅ <!-- Home --></button>
  
  <!-- TOP CENTER IMPORT BUTTON -->
  <div class="top-import-container">
    <label class="main-import-btn">
      <span>➕</span>Add Images
      <input type="file" accept="image/*" multiple onchange="importImages(event)" style="display:none;">
    </label>
  </div>

  <button id="pdfBtn" class="next-preview-btn" onclick="goToPDF()">Next</button>
  
  <div class="workspace-wrapper" id="workspaceWrapper">
    <div class="image-container" id="imageContainer"></div>
    
    <!-- Movable Text Layer -->
    <div id="movableTextLayer" class="movable-layer">
      <div class="layer-handle handle-rotate" ontouchstart="initTransform(event, 'text', 'rotate')" onmousedown="initTransform(event, 'text', 'rotate')">🔄</div>
      <div class="layer-handle handle-delete" onclick="deleteLayer('text')" ontouchstart="deleteLayer('text')">✕</div>
      <span id="textValDisplay">Custom Text</span>
      <div class="layer-handle handle-resize" ontouchstart="initTransform(event, 'text', 'resize')" onmousedown="initTransform(event, 'text', 'resize')">↘️</div>
    </div>

    <!-- Movable PIP Layer -->
    <div id="movablePipLayer" class="movable-layer">
      <div class="layer-handle handle-rotate" ontouchstart="initTransform(event, 'pip', 'rotate')" onmousedown="initTransform(event, 'pip', 'rotate')">🔄</div>
      <div class="layer-handle handle-delete" onclick="deleteLayer('pip')" ontouchstart="deleteLayer('pip')">✕</div>
      <img id="pipImgDisplay" style="width:100px; height:100px; object-fit:contain; display:block; pointer-events:none;">
      <div class="layer-handle handle-resize" ontouchstart="initTransform(event, 'pip', 'resize')" onmousedown="initTransform(event, 'pip', 'resize')">↘️</div>
    </div>
  </div>

  <!-- EDIT PANEL ENGINE TRAY -->
  <div id="editPanel" class="edit-panel">

    <div id="adjustPanel" class="sub-panel">
      <div class="slider-group"><label>Brightness</label><input type="range" id="brightRange" min="-50" max="50" value="0" oninput="updateFilters()"></div>
      <div class="slider-group"><label>Contrast</label><input type="range" id="contrastRange" min="-50" max="50" value="0" oninput="updateFilters()"></div>
      <div class="slider-group"><label>Saturation</label><input type="range" id="satRange" min="-50" max="50" value="0" oninput="updateFilters()"></div>
      <div class="slider-group"><label>Blur</label><input type="range" id="blurRange" min="0" max="10" value="0" oninput="updateFilters()"></div>
      <button onclick="bakeAdvancedEffects()" style="background:#00ffcc; color:black; border-radius:8px; padding:6px 12px; font-weight:bold;">Apply</button>
    </div>

    <div id="filterPanel" class="sub-panel">
      <button class="filter-btn" onclick="applyQuickFilter('none')">Original</button>
      <button class="filter-btn" onclick="applyQuickFilter('grayscale(100%)')">Grayscale</button>
      <button class="filter-btn" onclick="applyQuickFilter('sepia(100%)')">Sepia</button>
      <button class="filter-btn" onclick="applyQuickFilter('invert(100%)')">Retro Invert</button>
      <button class="filter-btn" onclick="applyQuickFilter('hue-rotate(90deg)')">Neon Hue</button>
    </div>

    <div id="textPanel" class="sub-panel">
      <input type="text" id="overlayText" placeholder="Type text or Emoji 😎" class="text-input-field">
      <button onclick="spawnMovableText()" style="background:#00ffcc; color:black; padding:8px 14px; border-radius:8px; font-weight:bold;">Place</button>
      <button onclick="burnLayerToImage('text')" style="background:#ffcc00; color:black; padding:8px 14px; border-radius:8px; font-weight:bold;">✔ Save Layer</button>
      <button onclick="deleteLayer('text')" style="background:rgba(255,0,85,0.2); color:#ff0055; padding:8px 14px; border-radius:8px; font-weight:bold; border:none;">🗑 Remove Text</button>
    </div>

    <div id="pipPanel" class="sub-panel">
      <label style="background:#27272a; padding:10px 14px; border-radius:8px; cursor:pointer; font-weight:bold;">Load Photo
        <input type="file" accept="image/*" onchange="spawnMovablePip(event)" style="display:none;">
      </label>
      <button onclick="burnLayerToImage('pip')" style="background:#ffcc00; color:black; padding:8px 14px; border-radius:8px; font-weight:bold;">✔ Save Layer</button>
      <button onclick="deleteLayer('pip')" style="background:rgba(255,0,85,0.2); color:#ff0055; padding:8px 14px; border-radius:8px; font-weight:bold; border:none;">🗑 Remove PIP</button>
    </div>

    <div id="cropPanel" class="sub-panel">
      <span style="color:#a1a1aa; font-size:14px;">Drag corners directly to crop</span>
      <button onclick="confirmCropBake()" style="background:#00ffcc; color:black; font-weight:bold; border-radius:8px; padding:8px 16px; font-size:15px;">✔ Apply Crop</button>
    </div>

    <!-- Scrollable Tools List -->
    <div class="tool-row">
      <button id="undoBtn" onclick="executeUndo()" disabled><span>↰</span>Undo</button>
      <button id="redoBtn" onclick="executeRedo()" disabled><span>↱</span>Redo</button>
      <button onclick="smartDeleteAction()" style="color:#ff0055;"><span>🗑️</span>Delete</button>
      <button onclick="switchSubPanel('adjustPanel')"><span>⚙️</span>Adjust</button>
      <button onclick="switchSubPanel('filterPanel')"><span>🎭</span>Filters</button>
      <button onclick="switchSubPanel('textPanel')"><span>✍️</span>Text</button>
      <button onclick="switchSubPanel('pipPanel')"><span>🖼️</span>PIP</button>
      <button onclick="triggerCropMode()"><span>✂️</span>Crop</button>
      <button onclick="rotateCoreImg()"><span>🔄</span>Rotate</button>
    </div>
  </div>
</div>

<!-- PAGE 3: PREVIEW & DOWNLOAD -->
<div id="page3" class="page">
  <button class="back-btn" onclick="showPage(2)">⬅ Edit</button>
  <button class="home-btn" onclick="goHome()">🏠 Home</button>
  
  <div style="margin-top: 60px; text-align:center;">
    <input type="text" id="pdfName" placeholder="Enter PDF Name..." style="background:white; border:1px solid #e5f504; color:black; padding:12px; width:80%; max-width:300px; border-radius:10px; font-size:16px; margin-bottom:15px;">
    
    <div style="background:#141416; padding:15px; border-radius:12px; max-width:350px; margin: 10px auto; border: 1px solid rgba(255,255,255,0.05);">
      <div style="margin-bottom:10px; font-weight:bold; color:#00ffcc;">Estimated Size: <span id="livePdfSizeDisplay">0 KB</span></div>
      <label style="font-size:14px; color:#a1a1aa;">Compress Quality Control</label>
      <input type="range" id="compressSlider" min="10" max="100" value="90" style="width:100%; accent-color:#00ffcc;" onchange="calculateLivePdfMetrics()">
    </div>

    <div style="margin: 20px 0;">
      <button onclick="generateAndSavePDF()" style="background:#00ffcc; color:black; font-weight:bold; padding:12px 24px; border-radius:30px; border:none; cursor:pointer; font-size:16px;">Download Compressed PDF</button>
    </div>
  </div>
  <div id="pdfPreview"></div>
</div>

<!-- PAGE 4: PDF TO IMAGE -->
<div id="page4" class="page">
  <button class="back-btn" onclick="showPage(1)">⬅ Back</button>
  <h2 style="margin-top:70px; text-align:center; font-weight:900; color:white;">📕 <!-- 𝙋𝘿𝙁 𝙏𝙤 𝙄𝙢𝙖𝙜𝙚 𝘾𝙪𝙣𝙫𝙚𝙧𝙩𝙚𝙧 --> PDF to Image Converter</h2>
  
  <div style="text-align:center; margin:20px 0;">
    <label style="background:linear-gradient(45deg, #00ffcc, #0096ff); color:black;border:3px solid #fbfcfc; font-weight:bold; padding:14px 28px; border-radius:30px ; cursor:pointer; display:inline-block;">
      📂 𝙎𝙚𝙡𝙚𝙘𝙩 𝙋𝘿𝙁 𝙁𝙞𝙡𝙚
      <input type="file" id="pdfInputSource" accept="application/pdf" onchange="processPdfToImageConversion(event)" style="display:none;">
    </label>
    <div id="conversionStatus" style="margin-top:10px; color:#a1a1aa;"></div>
    
    <button id="downloadAllImagesBtn" onclick="downloadAllExtractedImages()" style="background:#ff0055; color:white; font-weight:bold; padding:10px 20px; border-radius:20px; border:none; margin-top:15px; display:none; cursor:pointer;">📥 Download All Images</button>
  </div>

  <div id="pdfToImgPreview"></div>
</div>

<script>
let images = [];
let imageSettings = [];
let currentIndex = -1;
let cropper = null;
let currentDraftId = null;

let extractedPdfPages = [];
let undoStack = [];
let redoStack = [];

let layers = {
  text: { relX: 0.1, relY: 0.4, rotation: 0, fontSize: 28 },
  pip: { relX: 0.2, relY: 0.2, rotation: 0, width: 100, height: 100 }
};

function getDefaultSetting() {
  return { 
    brightness: 0, 
    contrast: 0, 
    saturation: 0, 
    blur: 0, 
    rawFilter: 'none',
    textLayer: { active: false, text: '', relX: 0.1, relY: 0.4, rotation: 0, fontSize: 28 },
    pipLayer: { active: false, src: '', relX: 0.2, relY: 0.2, rotation: 0, width: 100, height: 100 }
  };
}

function selectLayer(type) {
  if (type === 'text') {
    document.getElementById("movableTextLayer").classList.add("selected");
    document.getElementById("movablePipLayer").classList.remove("selected");
  } else if (type === 'pip') {
    document.getElementById("movablePipLayer").classList.add("selected");
    document.getElementById("movableTextLayer").classList.remove("selected");
  }
}

function deselectAllLayers() {
  const tLayer = document.getElementById("movableTextLayer");
  const pLayer = document.getElementById("movablePipLayer");
  if (tLayer) tLayer.classList.remove("selected");
  if (pLayer) pLayer.classList.remove("selected");
}

document.addEventListener("pointerdown", (e) => {
  const tLayer = document.getElementById("movableTextLayer");
  const pLayer = document.getElementById("movablePipLayer");
  
  if (tLayer && tLayer.contains(e.target)) return;
  if (pLayer && pLayer.contains(e.target)) return;
  if (e.target.closest('.sub-panel') || e.target.closest('.tool-row') || e.target.closest('.top-import-container')) return;

  deselectAllLayers();
});

function recordState() {
  saveCurrentLayersToSettings();
  undoStack.push(JSON.stringify({
    images: [...images],
    settings: JSON.parse(JSON.stringify(imageSettings)),
    currentIndex: currentIndex
  }));
  redoStack = []; 
  updateUndoRedoUI();
}

function executeUndo() {
  if (!undoStack.length) return;
  autoSaveCurrentFilterState();
  redoStack.push(JSON.stringify({
    images: [...images],
    settings: JSON.parse(JSON.stringify(imageSettings)),
    currentIndex: currentIndex
  }));

  const prevState = JSON.parse(undoStack.pop());
  images = prevState.images;
  imageSettings = prevState.settings;
  currentIndex = prevState.currentIndex;

  updateUndoRedoUI();
  killCropper();
  renderImages(currentIndex);
}

function executeRedo() {
  if (!redoStack.length) return;
  autoSaveCurrentFilterState();
  undoStack.push(JSON.stringify({
    images: [...images],
    settings: JSON.parse(JSON.stringify(imageSettings)),
    currentIndex: currentIndex
  }));

  const nextState = JSON.parse(redoStack.pop());
  images = nextState.images;
  imageSettings = nextState.settings;
  currentIndex = nextState.currentIndex;

  updateUndoRedoUI();
  killCropper();
  renderImages(currentIndex);
}

function updateUndoRedoUI() {
  const uBtn = document.getElementById("undoBtn");
  const rBtn = document.getElementById("redoBtn");
  if(uBtn) uBtn.disabled = (undoStack.length === 0);
  if(rBtn) rBtn.disabled = (redoStack.length === 0);
}

function showPage(num) {
  autoSaveCurrentFilterState();
  killCropper();
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page" + num).classList.add("active");
  if(num === 1) renderDraftSystem();
  if(num === 3) calculateLivePdfMetrics();
}

function startNewProject() {
  resetAppSystem();
  showPage(2);
  renderImages();
}

function killCropper() {
  if (cropper) { cropper.destroy(); cropper = null; }
  document.querySelectorAll(".sub-panel").forEach(p => p.classList.remove("active"));
}

function hideMovableLayers() {
  const tLayer = document.getElementById("movableTextLayer");
  const pLayer = document.getElementById("movablePipLayer");
  if(tLayer) tLayer.classList.remove("active", "selected");
  if(pLayer) pLayer.classList.remove("active", "selected");
}

function switchSubPanel(id) {
  const target = document.getElementById(id);
  const isOpen = target.classList.contains("active");
  document.querySelectorAll(".sub-panel").forEach(p => p.classList.remove("active"));
  if(!isOpen) target.classList.add("active");
}

function syncSlidersUI(idx) {
  const settings = (idx >= 0 && imageSettings[idx]) ? imageSettings[idx] : getDefaultSetting();
  document.getElementById("brightRange").value = settings.brightness || 0;
  document.getElementById("contrastRange").value = settings.contrast || 0;
  document.getElementById("satRange").value = settings.saturation || 0;
  document.getElementById("blurRange").value = settings.blur || 0;
}

function importImages(e) {
  const files = e.target.files;
  if(!files.length) return;
  autoSaveCurrentFilterState();
  recordState();
  for(let file of files) {
    const url = URL.createObjectURL(file);
    images.push(url);
    imageSettings.push(getDefaultSetting());
  }
  currentIndex = images.length - 1;
  renderImages(currentIndex);
}

function autoSaveCurrentFilterState() {
  saveCurrentLayersToSettings();
  if (cropper && currentIndex >= 0 && currentIndex < images.length) {
    const set = imageSettings[currentIndex];
    if (set && (set.brightness !== 0 || set.contrast !== 0 || set.saturation !== 0 || set.blur !== 0 || set.rawFilter !== 'none')) {
      applyBakeEffect(false); 
    }
  }
}

function saveCurrentLayersToSettings() {
  if (currentIndex < 0 || !imageSettings[currentIndex]) return;
  const tEl = document.getElementById("movableTextLayer");
  const pEl = document.getElementById("movablePipLayer");

  if (tEl.classList.contains("active")) {
    imageSettings[currentIndex].textLayer = {
      active: true,
      text: document.getElementById("textValDisplay").innerText,
      relX: layers.text.relX,
      relY: layers.text.relY,
      rotation: layers.text.rotation,
      fontSize: layers.text.fontSize
    };
  }
  if (pEl.classList.contains("active")) {
    imageSettings[currentIndex].pipLayer = {
      active: true,
      src: document.getElementById("pipImgDisplay").src,
      relX: layers.pip.relX,
      relY: layers.pip.relY,
      rotation: layers.pip.rotation,
      width: layers.pip.width,
      height: layers.pip.height
    };
  }
}

function restoreLayersFromSettings(idx) {
  hideMovableLayers();
  if (idx < 0 || !imageSettings[idx]) return;

  const set = imageSettings[idx];
  if (set.textLayer && set.textLayer.active) {
    layers.text = { ...set.textLayer };
    document.getElementById("textValDisplay").innerText = set.textLayer.text;
    applyLayerTransform('text');
    document.getElementById("movableTextLayer").classList.add("active");
    attachLayerDrag('text');
  }

  if (set.pipLayer && set.pipLayer.active) {
    layers.pip = { ...set.pipLayer };
    document.getElementById("pipImgDisplay").src = set.pipLayer.src;
    applyLayerTransform('pip');
    document.getElementById("movablePipLayer").classList.add("active");
    attachLayerDrag('pip');
  }
}

function renderImages(selected = currentIndex) {
  saveCurrentLayersToSettings();
  const container = document.getElementById("imageContainer");
  if (!container) return;
  container.innerHTML = "";

  if(images.length === 0) {
    container.innerHTML = `<div class="empty-box" style="width:100%; text-align:center; padding-top:100px; color:#a1a1aa;"><span>➕ No Images Added. Tap 'Import / Add Images' above.</span></div>`;
    document.getElementById("pdfBtn").style.display = "none";
    hideMovableLayers();
    return;
  }
  document.getElementById("pdfBtn").style.display = "block";

  images.forEach((src, i) => {
    const box = document.createElement("div");
    box.className = "image-box" + (i === selected ? " selected" : "");
    box.innerHTML = `
      <span class="index-tag">${i + 1}</span>
      <div class="action-overlay">
        <button onclick="shiftLeft(${i}, event)">⇇</button>
        <button onclick="removeImage(${i}, event)">🗑</button>
        <button onclick="shiftRight(${i}, event)"></button>
      </div>
      <img src="${src}">
    `;
    
    box.onclick = (e) => {
      if(e.target.tagName === 'BUTTON') return;
      if (currentIndex !== i) {
        autoSaveCurrentFilterState();
        killCropper();
        currentIndex = i;
        renderImages(currentIndex);
      }
    };
    container.appendChild(box);
  });

  if (selected >= 0 && selected < images.length) {
    currentIndex = selected;
    syncSlidersUI(currentIndex);
    restoreLayersFromSettings(currentIndex);
    setTimeout(() => {
      const imgEl = document.querySelector(".image-box.selected img");
      if (imgEl) initCropperWorkspace(imgEl);
    }, 60);
  }
}

function initCropperWorkspace(img) {
  if(cropper) { cropper.destroy(); }
  cropper = new Cropper(img, {
    viewMode: 1, 
    dragMode: 'none', 
    autoCrop: false, 
    background: false, 
    responsive: true, 
    checkOrientation: false,
    zoomable: false,
    zoomOnTouch: false,
    zoomOnWheel: false,
    movable: false,
    scalable: false,
    cropBoxMovable: true,
    cropBoxResizable: true,
    ready() {
      updateFiltersDisplay();
    }
  });
}

function shiftLeft(idx, e) {
  e.stopPropagation();
  if(idx <= 0) return;
  autoSaveCurrentFilterState();
  recordState();
  swapData(idx, idx - 1);
  renderImages(idx - 1);
}

function shiftRight(idx, e) {
  e.stopPropagation();
  if(idx >= images.length - 1) return;
  autoSaveCurrentFilterState();
  recordState();
  swapData(idx, idx + 1);
  renderImages(idx + 1);
}

function swapData(i, j) {
  [images[i], images[j]] = [images[j], images[i]];
  [imageSettings[i], imageSettings[j]] = [imageSettings[j], imageSettings[i]];
}

function removeImage(idx, e) {
  if(e && e.stopPropagation) e.stopPropagation();
  recordState();
  images.splice(idx, 1);
  imageSettings.splice(idx, 1);
  currentIndex = images.length - 1;
  killCropper();
  renderImages(currentIndex);
}

function smartDeleteAction() {
  const tLayer = document.getElementById("movableTextLayer");
  const pLayer = document.getElementById("movablePipLayer");

  if (tLayer && tLayer.classList.contains("selected")) {
    deleteLayer('text');
    return;
  }
  if (pLayer && pLayer.classList.contains("selected")) {
    deleteLayer('pip');
    return;
  }

  if (currentIndex < 0 || !images.length) return;
  removeImage(currentIndex, null);
}

function deleteLayer(type) {
  recordState();
  if (type === 'text') {
    const el = document.getElementById("movableTextLayer");
    el.classList.remove("active", "selected");
    if (imageSettings[currentIndex]) imageSettings[currentIndex].textLayer.active = false;
  } else if (type === 'pip') {
    const el = document.getElementById("movablePipLayer");
    el.classList.remove("active", "selected");
    if (imageSettings[currentIndex]) imageSettings[currentIndex].pipLayer.active = false;
  }
}

function rotateCoreImg() {

}

function triggerCropMode() {

}

function confirmCropBake() {

  renderImages(currentIndex);
}

function updateFilters() {
  if(currentIndex < 0 || !imageSettings[currentIndex]) return;
  imageSettings[currentIndex].brightness = Number(document.getElementById("brightRange").value);
  imageSettings[currentIndex].contrast = Number(document.getElementById("contrastRange").value);
  imageSettings[currentIndex].saturation = Number(document.getElementById("satRange").value);
  imageSettings[currentIndex].blur = Number(document.getElementById("blurRange").value);
  
  updateFiltersDisplay();
}

function updateFiltersDisplay() {
  if(!cropper) return;
  const set = imageSettings[currentIndex] || getDefaultSetting();
  const targetImg = document.querySelector(".cropper-container img");
  
  if(targetImg) {
    let filterChain = `brightness(${1 + set.brightness/100}) contrast(${1 + set.contrast/100}) saturate(${1 + set.saturation/100}) blur(${set.blur}px)`;
    if(set.rawFilter && set.rawFilter !== 'none') {
      filterChain += " " + set.rawFilter;
    }
    targetImg.style.filter = filterChain;
  }
}

function applyQuickFilter(filterString) {
  if(currentIndex < 0 || !imageSettings[currentIndex]) return;
  imageSettings[currentIndex].rawFilter = filterString;
  updateFiltersDisplay();
}

function applyBakeEffect(shouldRecordState = true) {
  if(!cropper || currentIndex < 0) return;
  const canvas = cropper.getCroppedCanvas();
  if(!canvas) return;
  
  if(shouldRecordState) recordState();

  const tempCanvas = document.createElement("canvas");
  tempCanvas.width = canvas.width;
  tempCanvas.height = canvas.height;
  const ctx = tempCanvas.getContext("2d");
  
  const set = imageSettings[currentIndex] || getDefaultSetting();

  let filterChain = `brightness(${1 + set.brightness/100}) contrast(${1 + set.contrast/100}) saturate(${1 + set.saturation/100}) blur(${set.blur}px)`;
  if(set.rawFilter && set.rawFilter !== 'none') {
    filterChain += " " + set.rawFilter;
  }
  
  ctx.filter = filterChain;
  ctx.drawImage(canvas, 0, 0);
  
  images[currentIndex] = tempCanvas.toDataURL("image/jpeg", 0.85);
  
  const oldText = imageSettings[currentIndex].textLayer;
  const oldPip = imageSettings[currentIndex].pipLayer;
  imageSettings[currentIndex] = getDefaultSetting(); 
  imageSettings[currentIndex].textLayer = oldText;
  imageSettings[currentIndex].pipLayer = oldPip;

  syncSlidersUI(currentIndex);
}

function bakeAdvancedEffects() {

  killCropper();
  renderImages(currentIndex);
}

function applyLayerTransform(type) {
  const l = layers[type];
  const el = (type === 'text') ? document.getElementById("movableTextLayer") : document.getElementById("movablePipLayer");
  const selectedBox = document.querySelector(".image-box.selected");
  if (!selectedBox) return;

  const wrapperBounds = document.getElementById("workspaceWrapper").getBoundingClientRect();
  const boxBounds = selectedBox.getBoundingClientRect();

  const absX = (boxBounds.left - wrapperBounds.left) + (l.relX * boxBounds.width);
  const absY = (boxBounds.top - wrapperBounds.top) + (l.relY * boxBounds.height);

  el.style.left = absX + "px";
  el.style.top = absY + "px";
  el.style.transform = `rotate(${l.rotation}deg)`;
  
  if(type === 'text') {
    el.style.fontSize = l.fontSize + "px";
  } else {
    const imgEl = document.getElementById("pipImgDisplay");
    imgEl.style.width = l.width + "px";
    imgEl.style.height = l.height + "px";
  }
}

function attachLayerDrag(type) {
  const el = (type === 'text') ? document.getElementById("movableTextLayer") : document.getElementById("movablePipLayer");
  
  const onStart = (e) => {
    if(e.target.classList.contains('layer-handle')) return;
    selectLayer(type);

    const selectedBox = document.querySelector(".image-box.selected");
    if(!selectedBox) return;

    const boxBounds = selectedBox.getBoundingClientRect();

    const isTouch = e.type.startsWith('touch');
    const clientX = isTouch ? e.touches[0].clientX : e.clientX;
    const clientY = isTouch ? e.touches[0].clientY : e.clientY;

    let startRelX = layers[type].relX - ((clientX - boxBounds.left) / boxBounds.width);
    let startRelY = layers[type].relY - ((clientY - boxBounds.top) / boxBounds.height);

    const onMove = (ev) => {
      if (ev.cancelable) ev.preventDefault();
      const isMoveTouch = ev.type.startsWith('touch');
      const cX = isMoveTouch ? ev.touches[0].clientX : ev.clientX;
      const cY = isMoveTouch ? ev.touches[0].clientY : ev.clientY;
      
      layers[type].relX = ((cX - boxBounds.left) / boxBounds.width) + startRelX;
      layers[type].relY = ((cY - boxBounds.top) / boxBounds.height) + startRelY;
      
      applyLayerTransform(type);
      saveCurrentLayersToSettings();
    };

    const onEnd = () => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("touchmove", onMove);
      document.removeEventListener("mouseup", onEnd);
      document.removeEventListener("touchend", onEnd);
    };

    document.addEventListener("mousemove", onMove);
    document.addEventListener("touchmove", onMove, { passive: false });
    document.addEventListener("mouseup", onEnd);
    document.addEventListener("touchend", onEnd);
  };

  el.onmousedown = onStart;
  el.ontouchstart = onStart;
}

function initTransform(e, type, action) {
  e.stopPropagation();
  if (e.cancelable) e.preventDefault();
  selectLayer(type);
  
  const el = (type === 'text') ? document.getElementById("movableTextLayer") : document.getElementById("movablePipLayer");
  const rect = el.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;

  const onMove = (ev) => {
    if (ev.cancelable) ev.preventDefault();
    const isTouch = ev.type.startsWith('touch');
    const clientX = isTouch ? ev.touches[0].clientX : ev.clientX;
    const clientY = isTouch ? ev.touches[0].clientY : ev.clientY;

    if(action === 'rotate') {
      const rad = Math.atan2(clientY - centerY, clientX - centerX);
      let deg = rad * (180 / Math.PI) - 90;
      layers[type].rotation = Math.round(deg);
    } else if (action === 'resize') {
      const dist = Math.hypot(clientX - centerX, clientY - centerY);
      if(type === 'text') {
        layers.text.fontSize = Math.max(14, Math.round(dist / 2));
      } else {
        const size = Math.max(40, Math.round(dist * 1.5));
        layers.pip.width = size;
        layers.pip.height = size;
      }
    }
    applyLayerTransform(type);
    saveCurrentLayersToSettings();
  };

  const onEnd = () => {
    document.removeEventListener("mousemove", onMove);
    document.removeEventListener("touchmove", onMove);
    document.removeEventListener("mouseup", onEnd);
    document.removeEventListener("touchend", onEnd);
  };

  document.addEventListener("mousemove", onMove);
  document.addEventListener("touchmove", onMove, { passive: false });
  document.addEventListener("mouseup", onEnd);
  document.addEventListener("touchend", onEnd);
}

async function burnLayerToImage(type) {
  if(currentIndex < 0) return;
  saveCurrentLayersToSettings();
  recordState();

  const compiledDataUrl = await getCompositeImageUrl(currentIndex, 0.95);
  images[currentIndex] = compiledDataUrl;
  
  deleteLayer(type);
  killCropper();
  renderImages(currentIndex);
}

function getCompositeImageUrl(idx, quality = 0.85) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "Anonymous";
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext("2d");

      const set = imageSettings[idx] || getDefaultSetting();
      let filterChain = `brightness(${1 + (set.brightness||0)/100}) contrast(${1 + (set.contrast||0)/100}) saturate(${1 + (set.saturation||0)/100}) blur(${set.blur||0}px)`;
      if(set.rawFilter && set.rawFilter !== 'none') filterChain += " " + set.rawFilter;
      ctx.filter = filterChain;
      ctx.drawImage(img, 0, 0);
      ctx.filter = "none";

      const selectedBox = document.querySelector(".image-box.selected") || document.querySelector(".image-box");
      const boxWidth = selectedBox ? selectedBox.getBoundingClientRect().width : 250;
      const boxHeight = selectedBox ? selectedBox.getBoundingClientRect().height : 310;

      const scaleX = canvas.width / boxWidth;
      const scaleY = canvas.height / boxHeight;

      if (set.textLayer && set.textLayer.active && set.textLayer.text) {
        ctx.save();
        const posX = set.textLayer.relX * canvas.width + (30 * scaleX);
        const posY = set.textLayer.relY * canvas.height + (20 * scaleY);

        ctx.translate(posX, posY);
        ctx.rotate((set.textLayer.rotation * Math.PI) / 180);

        const fontResized = Math.floor(set.textLayer.fontSize * scaleX);
        ctx.font = `bold ${fontResized}px Arial`;
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillStyle = "#ffffff";
        ctx.strokeStyle = "#000000";
        ctx.lineWidth = Math.max(2, Math.floor(fontResized * 0.12));
        ctx.strokeText(set.textLayer.text, 0, 0);
        ctx.fillText(set.textLayer.text, 0, 0);
        ctx.restore();
      }

      if (set.pipLayer && set.pipLayer.active && set.pipLayer.src) {
        const pImg = new Image();
        pImg.crossOrigin = "Anonymous";
        pImg.onload = () => {
          ctx.save();
          const posX = set.pipLayer.relX * canvas.width + ((set.pipLayer.width/2) * scaleX);
          const posY = set.pipLayer.relY * canvas.height + ((set.pipLayer.height/2) * scaleY);
          ctx.translate(posX, posY);
          ctx.rotate((set.pipLayer.rotation * Math.PI) / 180);
          const tw = set.pipLayer.width * scaleX;
          const th = set.pipLayer.height * scaleY;
          ctx.drawImage(pImg, -tw / 2, -th / 2, tw, th);
          ctx.restore();
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        pImg.onerror = () => resolve(canvas.toDataURL("image/jpeg", quality));
        pImg.src = set.pipLayer.src;
        return;
      }

      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => resolve(images[idx]);
    img.src = images[idx];
  });
}

function calculateLivePdfMetrics() {
  const quality = Number(document.getElementById("compressSlider").value) / 100;
  let simulatedBytes = 0;
  images.forEach(i => {
    simulatedBytes += (i.length * 0.75) * quality;
  });
  
  let formattedSize = (simulatedBytes / 1024).toFixed(1) + " KB";
  if(simulatedBytes > 1048576) formattedSize = (simulatedBytes / 1048576).toFixed(1) + " MB";
  
  document.getElementById("livePdfSizeDisplay").innerText = formattedSize;
}

async function generateAndSavePDF() {

async function processPdfToImageConversion(e) {
  const file = e.target.files[0];
  if(!file) return;

  const statusEl = document.getElementById("conversionStatus");
  const previewContainer = document.getElementById("pdfToImgPreview");
  statusEl.innerText = "Processing PDF Elements... Please wait.";
  previewContainer.innerHTML = "";
  extractedPdfPages = [];
  
  try {
    const fileReader = new FileReader();
    fileReader.onload = async function() {
      const typedarray = new Uint8Array(this.result);
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
      
      const pdf = await pdfjsLib.getDocument(typedarray).promise;
      statusEl.innerText = `Found ${pdf.numPages} Pages. Generating Previews...`;
      
      for(let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1.5 });
        
        const canvas = document.createElement('canvas');
        const canvasCtx = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        
        const renderContext = { canvasContext: canvasCtx, viewport: viewport };
        await page.render(renderContext).promise;
        
        const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
        extractedPdfPages.push(dataUrl);
      }
      
      statusEl.innerText = "Conversion Finished!";
      document.getElementById("downloadAllImagesBtn").style.display = "inline-block";
      renderPdfToImagePreviewDeck();
    };
    fileReader.readAsArrayBuffer(file);
  } catch(err) {
    statusEl.innerText = "Error encountered during execution.";
    console.error(err);
  }
}

function renderPdfToImagePreviewDeck() {
  const previewContainer = document.getElementById("pdfToImgPreview");
  previewContainer.innerHTML = "";
  
  if(extractedPdfPages.length === 0) {
    document.getElementById("downloadAllImagesBtn").style.display = "none";
    return;
  }
  
  extractedPdfPages.forEach((dataSrc, index) => {
    const block = document.createElement("div");
    block.className = "preview-item-wrapper";
    block.innerHTML = `
      <button class="preview-delete-btn" onclick="removeExtractedPage(${index})">✕</button>
      <img src="${dataSrc}">
      <a href="${dataSrc}" download="Page_${index+1}.jpg" style="display:block; text-align:center; color:#00ffcc; text-decoration:none; font-size:12px; margin-top:5px; font-weight:bold;">Save Page</a>
    `;
    previewContainer.appendChild(block);
  });
}

function removeExtractedPage(idx) {
  extractedPdfPages.splice(idx, 1);
  renderPdfToImagePreviewDeck();
}

function downloadAllExtractedImages() {
  if(!extractedPdfPages.length) return;
  extractedPdfPages.forEach((src, idx) => {
    const triggerLink = document.createElement("a");
    triggerLink.href = src;
    triggerLink.download = `Extracted_Page_${idx + 1}.jpg`;
    document.body.appendChild(triggerLink);
    setTimeout(() => {
      triggerLink.click();
      document.body.removeChild(triggerLink);
    }, idx * 250);
  });
}

function resetAppSystem() {
  killCropper();
  hideMovableLayers();
  images = []; imageSettings = []; currentIndex = -1; currentDraftId = null;
  extractedPdfPages = [];
  undoStack = []; redoStack = []; updateUndoRedoUI();
  document.getElementById("pdfName").value = "";
  document.getElementById("pdfToImgPreview").innerHTML = "";
  document.getElementById("conversionStatus").innerText = "";
  document.getElementById("downloadAllImagesBtn").style.display = "none";
}

function compressImageForDraft(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "Anonymous";
    img.onload = () => {
      const canvas = document.createElement("canvas");
      let width = img.width;
      let height = img.height;
      const maxDim = 1000;

      if (width > maxDim || height > maxDim) {
        if (width > height) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
      }

      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL("image/jpeg", 0.6));
    };
    img.onerror = () => resolve(src);
    img.src = src;
  });
}

async function saveProjectDraft() {
  saveCurrentLayersToSettings();
  const compressedImages = await Promise.all(images.map(img => compressImageForDraft(img)));

  let sizeInBytes = 0;
  compressedImages.forEach(i => sizeInBytes += (i ? i.length * 0.75 : 0));
  let sizeStr = (sizeInBytes / 1024).toFixed(1) + " KB";
  if(sizeInBytes > 1048576) sizeStr = (sizeInBytes / 1048576).toFixed(1) + " MB";

  let allDrafts = JSON.parse(localStorage.getItem("proPdfDrafts")) || [];

  const draft = {
    id: currentDraftId || Date.now(),
    date: new Date().toLocaleDateString(),
    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
    pdfName: document.getElementById("pdfName").value.trim() || "Untitled Project",
    images: compressedImages,
    settings: [...imageSettings],
    pages: compressedImages.length,
    fileSize: sizeStr
  };

  if(currentDraftId) {
    const idx = allDrafts.findIndex(d => d.id === currentDraftId);
    if(idx !== -1) allDrafts[idx] = draft;
  } else {
    allDrafts.unshift(draft);
  }

  try {
    localStorage.setItem("proPdfDrafts", JSON.stringify(allDrafts));
  } catch (error) {
    allDrafts.pop();
    try {
      localStorage.setItem("proPdfDrafts", JSON.stringify(allDrafts));
    } catch (e) {
      console.error("Storage full", e);
    }
  }
}

async function goHome() {
  autoSaveCurrentFilterState();
  if(images.length > 0) {
    await saveProjectDraft();
  }
  resetAppSystem();
  showPage(1);
}

function renderDraftSystem() {
  const box = document.getElementById("draftList");
  if(!box) return;
  box.innerHTML = "";
  let allDrafts = JSON.parse(localStorage.getItem("proPdfDrafts")) || [];
  
  if(!allDrafts.length) {
    box.innerHTML = `<div style="text-align:center; padding:30px; color:#52525b;">No premium drafts found.</div>`;
    return;
  }
  
  allDrafts.forEach(d => {
    box.innerHTML += `
      <div class="draft-card">
        <div class="draft-left">
          <img class="draft-thumb" src="${d.images[0]}">
          <div class="draft-details">
            <h4>${d.pdfName}</h4>
            <div class="draft-meta">
              <span>📄 ${d.pages} Pages</span>
              <span>📦 ${d.fileSize}</span>
            </div>
            <div class="draft-meta">              
              <span>📅 ${d.date} at ${d.time}</span>
            </div>
          </div>
        </div>
        <div class="draft-actions">
          <button class="btn-cont" onclick="loadDraftProject(${d.id})">Open</button>
          <button class="btn-del" onclick="removeDraftProject(${d.id})">Drop</button>
        </div>
      </div>`;
  });
}


function loadDraftProject(id) {
  let allDrafts = JSON.parse(localStorage.getItem("proPdfDrafts")) || [];
  const draft = allDrafts.find(x => x.id === id);
  if(!draft) return;
  
  images = [...draft.images];
  imageSettings = [...draft.settings];
  currentDraftId = draft.id;
  document.getElementById("pdfName").value = draft.pdfName;
  
  undoStack = []; redoStack = []; updateUndoRedoUI();
  showPage(2);
  renderImages(0);
}

function removeDraftProject(id) {
  let allDrafts = JSON.parse(localStorage.getItem("proPdfDrafts")) || [];
  allDrafts = allDrafts.filter(x => x.id !== id);
  localStorage.setItem("proPdfDrafts", JSON.stringify(allDrafts));
  renderDraftSystem();
}

function deleteAllDrafts() {
  if(!confirm("Are you sure to delete all pro projects?")) return;
  localStorage.removeItem("proPdfDrafts");
  renderDraftSystem();
}

document.addEventListener("DOMContentLoaded", renderDraftSystem);
</script>
