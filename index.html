<!DOCTYPE html>
<html lang="en">
<head>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  padding-top: 0px;
  background: black;  /* 🔥 ADD THIS */}

/* Background */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  filter: blur(0px) brightness(0.3);
  z-index: -1;}
  
  body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("bg.jpg") center/cover no-repeat;
  filter: brightness(0.4);
  z-index: -1;
}

/* DARK MODE */
body.no-bg::before {
  display: none;
}

/* Header */
.header {
  margin-top: 8px; 
  text-align: center;
  font-size: 28px;
  padding: 15px;
  font-weight: bold;}
.header {
        background: linear-gradient(90deg, red,red, gold, yellow);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;

    text-shadow: 2px 2px 8px rgba(255,0,0,0.);
}

/* Pages */
.page {
  display: none;
  padding: 20px;}

.active {
  display: block;}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;}

/* Buttons */
button{
    position:relative;
    overflow:hidden;
  font-size:16px;
    font-weight:800;
    letter-spacing:0.5px;
    border-radius:10px;
    padding:12px;
    color:white;
    border:white 2px solid;
    cursor:pointer;
    background:linear-gradient(45deg,#ff0000,#111);
    transition:.3s;
    box-shadow:0 0 10px ;}


button span{
    position:relative;
    z-index:2;}

#menuBtn {
  position: fixed;
  top: 80px;
  right: 15px;
  font-size: 28px;
  color: white;
  background: transparent;
  border: none;
  cursor: pointer;
  z-index: 1000;}

#menuBox {
  position: fixed;
  top: 60px;
  right: 15px;
  display: none;
  flex-direction: column;
  gap: 10px;
  z-index: 1000;}

#menuBox button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, rgb(236, 9, 24), pink);
  color: white;
  cursor: pointer;}

  /* 🔥 GET FREE BUTTON */
.get-free-btn {
  position: fixed;
  top: 10px;
  left: 5px;
  padding: 5px 7px;
  font-size: 14px;
  font-weight: bold;
  color: #fff;
  text-decoration: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #ffd700, #ffb300, #fff8dc);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.4);
  box-shadow: 
    0 0 15px rgba(255,215,0,0.6),
    inset 0 0 10px rgba(255,255,255,0.5);
  overflow: hidden;
  z-index: 9999;
  transition: 0.3s;}

.get-free-btn:hover {
  transform: scale(1.08);
  box-shadow: 
    0 0 25px gold,
    inset 0 0 15px white;}

/* ✨ SHINE EFFECT */
.get-free-btn span {
  position: absolute;
  top: 0;
  width: 40%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.8),
    transparent);
  transform: skewX(-20deg);
  text-shadow: 
  0 0 5px orange,
  0 0 10px orange,
  0 0 20px #ff8c00,
  0 0 30px #ee0404;}

.sectionTitle{
    grid-column:1/-1;
    position:relative;
    padding:7px 18px;
    margin:25px 0;
    border-radius:12px;
    background:linear-gradient(135deg,#ffd700,#ff0000,#ffd700);
    overflow:hidden;
    border:2px solid gold;
    box-shadow:
0 0 8px rgba(255,215,0,.6);
    backdrop-filter:blur(15px);}

.sectionTitle h2{
    margin:0;
    text-align:center;
    color:white;
    font-size:18px;
    margin:0;
    text-shadow:
    0 0 10px white,
    0 0 20px gold;}

.top-navbar{
  top: -22px;
  width: 22%;
  flex-wrap: nowrap;        /* ❌ wrap band */
  overflow-x: auto;         /* 👉 scroll allow */
  white-space: nowrap;      /* ❌ line break band */
  display: flex;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 0 0 15px 15px;
  border: 1px solid white;
  box-shadow: 0 0 20px ;}
  
.top-navbar a{
  text-decoration: none;
  color: white;
  font-size: 14px;
  font-weight: bold;
  padding: 1px 3px;
  transition: 0.3s;
  white-space: nowrap;}
  
/* mobile */
@media (max-width: 768px) {
  .top-navbar{
    position: relative; 
    width: 43%;
    right:-80px;
    padding: 10px 110px;
    justify-content: flex-start;  /* 👈 left align */
    overflow-x: auto;
    padding-left: 15px;}}
    
/* Laptop/Desktop */
@media (min-width: 1024px) {
  .top-navbar {
    width: auto;
    justify-content: right; /* right side */
    position: fixed;
    padding: 10px 50px;
    height: 15px;
    right: 10px ;  /* yaha adjust karo */
    top: -1px;}}

      @media (max-width: 600px) {
.img-box {flex-direction: column;}}
.img-box {
  width: 100%;
  max-width: 1000px;
  margin: 40px auto;
  padding: 10px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.img-box img {
  width: 100%;
  border-radius: 15px;
}
</style>

<script>

function toggleMenu() {
  let menu = document.getElementById("menuBox");
  menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}
function openBlog() {
  window.location.href = "blog.html";
}
function openAbout() {
  window.location.href = "about.html";
}

function toggleDarkMode() {
  let body = document.body;
  let btn = document.getElementById("darkBtn");
  body.classList.toggle("no-bg");

  // Button text change
  if (body.classList.contains("no-bg")) {
    btn.innerText = "Light Mode";
  } else {
    btn.innerText = "Dark Mode";
  }
}
// Close menu when clicking outside
document.addEventListener("click", function(e) {
  let menu = document.getElementById("menuBox");
  let menuBtn = document.getElementById("menuBtn");

  // agar click menu ya button ke bahar hua
  if (!menu.contains(e.target) && !menuBtn.contains(e.target)) {
    menu.style.display = "none";
  }
});
function showPage(num){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page"+num).classList.add("active");
  window.scrollTo(0,0);
}

let isDown = false;
let startX;
let scrollLeft;
</script>
