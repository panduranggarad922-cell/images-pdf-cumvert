<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;

/* Background */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('bgnm.jpeg') no-repeat center/cover;
  filter: blur(0px) brightness(0.3);
  z-index: -1;

/* Header */

  text-align: center;

  padding: 15px;
  font-weight: bold;

/* Pages */

  display: none;
  padding: 20px;
}

  display: block;
}

/* Grid */

  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;

/* Buttons */

  padding: 12px;
  border-radius: 10px;
  border: none;

  transform: scale(1.05);

/* Code */

  padding: 15px;

  height: 220px;           /* ✅ fixed height (box bada nahi hoga) */
  overflow-y: auto;        /* ✅ andar scroll hoga */
  
  white-space: pre-wrap;   /* ✅ line break properly */

/* Typing */

}

<body>

<div class="header">Programming Language Coding, Typing Test</div>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h3>Select Language</h3>
<div class="grid" id="languages"></div>
   <div style="text-align:center; font-size:12px; margin-top:80px;">

     <a href="contact.html" style="color:white; margin:0 10px; opacity:0.7; text-decoration:none;">Contact</a>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
<span id="langTitle"></span>
<div class="grid" id="projects"></div>
<button onclick="goBack(1)" style="position:absolute; top:15px; left:15px;">
  Back
</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
<div class="timer" id="timer">2:00</div>

<!-- 🔴 End Exam -->
<button onclick="endExam()" style="position:absolute; top:15px; right:15px; background:red;">
End Exam
</button>

<span id="testTitle"></span>

<div class="code-box" id="code"></div>

<button onclick="goBack(2)" style="position:absolute; top:15px; left:15px;">
  Back
</button>

<textarea id="typing" oninput="highlightText()"></textarea>
</div>

<!-- PAGE 4 -->
<div id="page4" class="page">
<h2 id="resultText"></h2>

<div>WPM</div>
<div class="bar"><div id="wpmBar" class="fill"></div></div>

<div>Accuracy</div>
<div class="bar"><div id="accBar" class="fill"></div></div>

<div>Mistakes</div>
<div class="bar"><div id="mistakeBar" class="fill"></div></div>

<!-- 🔥 NEW SPEED -->
<div>Speed</div>
<div class="bar"><div id="speedBar" class="fill"></div></div>

<h3 id="score"></h3>

<button onclick="restart()">Restart</button>
<button onclick="goBack(2)">Back</button>
</div>

<script>

// Languages
const languages = ["Python","Java","C++","HTML","CSS","JavaScript","TypeScript","Kotlin","Swift","Node.js","Dart","Rust","C#","R"];

function showPage(p){
  document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
  document.getElementById("page"+p).classList.add("active");
}

const langDiv = document.getElementById("languages");

languages.forEach(lang=>{
  let btn = document.createElement("button");
  btn.innerText = lang;
  btn.onclick = ()=>selectLang(lang);
  langDiv.appendChild(btn);
});

let selectedProjects = [];
let selectedCode = "";
let time = 120;
let timerInterval;
let currentLang = "";
let currentProject = "";

// Select Language
function selectLang(lang){
  currentLang = lang;
  document.getElementById("langTitle").innerText = lang;

  selectedProjects = generateProjects(lang);
  let projDiv = document.getElementById("projects");
  projDiv.innerHTML = "";

  selectedProjects.forEach(p=>{
    let btn = document.createElement("button");
    btn.innerText = p.name;
    btn.onclick = ()=>startTest(p);
    projDiv.appendChild(btn);
  });

  showPage(2);
}

// Start Test
function startTest(p){
  currentProject = p.name;
  selectedCode = p.code;

  document.getElementById("testTitle").innerText = currentLang + " - " + currentProject;
  document.getElementById("code").innerText = selectedCode;
  document.getElementById("typing").value = "";

  highlightText();

  time = 120;
  updateTimer();

  showPage(3);

  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    time--;
    updateTimer();

    if(time <= 0){
      clearInterval(timerInterval);
      finishTest();
    }
  },1000);
}

// 🔴 End Exam
function endExam(){
  clearInterval(timerInterval);

  let typed = document.getElementById("typing").value;

  if(typed.length < selectedCode.length){
    document.getElementById("resultText").innerHTML =
      "⚠️ Exam Not Complete To User";
  }

  finishTest();
}

// Highlight
function highlightText() {
  let input = document.getElementById("typing").value;
  let result = "";

  for (let i = 0; i < selectedCode.length; i++) {
    if (i < input.length) {
      if (input[i] === selectedCode[i]) {
        result += `<span style="color: lightgreen">${selectedCode[i]}</span>`;
      } else {
        result += `<span style="color: red">${selectedCode[i]}</span>`;
      }
    } else {
      result += selectedCode[i];
    }
  }

  document.getElementById("code").innerHTML = result;
}

// Timer
function updateTimer(){
  let min = Math.floor(time / 60);
  let sec = time % 60;
  document.getElementById("timer").innerText =
    `${min}:${sec < 10 ? "0"+sec : sec}`;
}

// 🔥 FINAL RESULT LOGIC
function finishTest(){
  let typed = document.getElementById("typing").value;
  let correct = 0;

  for(let i=0;i<typed.length;i++){
    if(typed[i] === selectedCode[i]) correct++;
  }

  let accuracy = Math.round((correct/selectedCode.length)*100);

  let progress = Math.round((typed.length / selectedCode.length) * 100);
  if(progress > 100) progress = 100;

  let words = typed.trim().split(/\s+/).filter(w=>w).length;
  let wpm = Math.round((words/2) * (progress/100));

  let mistakes = typed.length - correct;
  if(mistakes < 0) mistakes = 0;

  let wpmPercent = Math.min(wpm,100);
  let mistakePercent = Math.min(mistakes,100);

  document.getElementById("wpmBar").style.width = wpmPercent + "%";
  document.getElementById("accBar").style.width = accuracy + "%";
  document.getElementById("mistakeBar").style.width = mistakePercent + "%";
  document.getElementById("speedBar").style.width = progress + "%";

  document.getElementById("score").innerText =
    "WPM: " + wpmPercent + "% | Accuracy: " + accuracy + "% | Mistakes: " + mistakePercent + "% | Speed: " + progress + "%";

  if(!document.getElementById("resultText").innerHTML){
    document.getElementById("resultText").innerHTML =
      accuracy >= 50 ? "🏆 Pass!" : "❌ Try Again";
  }

  showPage(4);
}

// Restart
function restart(){
  startTest({name: currentProject, code: selectedCode});
}

// Back
function goBack(p){
  showPage(p);
}

</script>
